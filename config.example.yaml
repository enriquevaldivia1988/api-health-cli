# healthcheck configuration example
# Copy this file to endpoints.yaml and customize for your environment.

endpoints:
  - url: https://api.example.com/health
    method: GET
    timeout: 5s
    retries: 2
    expected_status: 200
    headers:
      Authorization: "Bearer ${API_TOKEN}"
      Accept: "application/json"

  - url: https://status.example.com/health
    method: GET
    timeout: 10s
    expected_status: 200

  - url: https://internal.example.com/readiness
    method: GET
    timeout: 3s
    retries: 1
    expected_status: 200

notifications:
  slack:
    webhook_url: "${SLACK_WEBHOOK_URL}"
    on_failure: true
